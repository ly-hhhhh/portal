<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我還沒想好網站名字：）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="portal-wrapper">
  
  <header class="portal-header">
    <h1>NUTN的各個網站們</h1>
    <div class="header-line"></div>
    <p class="portal-subtitle">一鍵前往所需系統叭</p>
  </header>

  <div class="portal-grid">
    
        <a href="https://academics.nutn.edu.tw/iSTU/" target="_blank" class="portal-card official-card">
      <div class="card-content">
        <div class="card-badge school">NUTN</div>
        <h2>學生系統</h2>
        <div class="card-tags"><span>成績查詢</span><span>各類申請</span></div>
      </div>
    </a>

    <a href="https://student.nutn.edu.tw/iOSA/Student/stuMain.aspx" target="_blank" class="portal-card official-card">
      <div class="card-content">
        <div class="card-badge school">NUTN</div>
        <h2>學務系統</h2>
        <div class="card-tags"><span>就學貸款</span><span>請假缺曠</span></div>
      </div>
    </a>

    <a href="https://ecourse.nutn.edu.tw/course_list.aspx" target="_blank" class="portal-card official-card">
      <div class="card-content">
        <div class="card-badge school">NUTN</div>
        <h2>ECourse 一口酥</h2>
        <div class="card-tags"><span>課堂作業</span><span>課程教材</span></div>
      </div>
    </a>

    <a href="https://academics.nutn.edu.tw/Course/" target="_blank" class="portal-card official-card">
      <div class="card-content">
        <div class="card-badge school">NUTN</div>
        <h2>課程資訊與選課系統</h2>
        <div class="card-tags"><span>即時選課</span><span>開課查詢</span></div>
      </div>
    </a>

    <a href="https://campus.nutn.edu.tw/ActReg/" target="_blank" class="portal-card official-card">
      <div class="card-content">
        <div class="card-badge school">NUTN</div>
        <h2>活動報名系統</h2>
        <div class="card-tags"><span>講座報名</span></div>
      </div>
    </a>

    <a href="https://ly-hhhhh.github.io/credit-calculator/" target="_blank" class="portal-card tool-card">
      <div class="card-content">
        <div class="card-badge tool">TOOL</div>
        <h2>南戲選課計算機</h2>
        <div class="card-tags"><span>學分統計</span><span>選課計算機</span></div>
      </div>
    </a>

    <a href="https://ly-hhhhh.github.io/middle-school/" target="_blank" class="portal-card tool-card">
      <div class="card-content">
        <div class="card-badge tool">TOOL</div>
        <h2>中教選課計算機</h2>
        <div class="card-tags"><span>中等學程</span><span>選課計算機</span></div>
      </div>
    </a>

    <a href="https://ly-hhhhh.github.io/elementary-school/" target="_blank" class="portal-card tool-card">
      <div class="card-content">
        <div class="card-badge tool">TOOL</div>
        <h2>小教選課計算機</h2>
        <div class="card-tags"><span>國小學程</span><span>選課計算機</span></div>
      </div>
    </a>

    <div class="portal-card coming-soon-card" onclick="alert('頁面建立中 :D')">
      <div class="card-content">
        <div class="card-badge soon">SOON</div>
        <h2>系辦生存守則</h2>
        <div class="card-tags"><span>教室借用</span><span>道具借用</span></div>
      </div>
    </div>

  <footer class="portal-footer">
    有任何建議指教，歡迎到<a href="https://tellonym.me/ddca.cc/anything" target="_blank">匿名箱</a>留言，我們不一定會聽<br>祝順利畢業！😻
